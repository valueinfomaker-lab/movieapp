<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="logo" href="#" aria-label="홈으로 이동">MOVIE</a>
      <form id="searchForm" class="search" role="search">
        <input
          id="searchInput"
          type="search"
          placeholder="영화 / TV 검색"
          autocomplete="off"
          aria-label="영화 또는 TV 검색"
        />
        <button type="submit">검색</button>
      </form>
    </header>

    <main>
      <section class="controls">
        <label for="genreSelect">장르</label>
        <select id="genreSelect" aria-label="장르 선택">
          <option value="">전체 장르</option>
        </select>
        <button id="wishlistToggle" type="button" aria-pressed="false">찜한 콘텐츠 보기</button>
      </section>
      <section id="recentSearches" class="recent-searches" aria-label="최근 검색어"></section>
      <section id="hero" class="hero" aria-live="polite"></section>
      <section id="rows" class="rows"></section>
      <div id="loadMoreAnchor" class="load-anchor" aria-hidden="true"></div>
      <section id="detailView" class="detail-view hidden" aria-live="polite"></section>
    </main>

    <nav class="mobile-nav" aria-label="모바일 하단 메뉴">
      <button data-scroll="#hero">홈</button>
      <button data-scroll="#rows">카테고리</button>
      <button id="focusSearch">검색</button>
    </nav>

    <dialog id="detailModal" class="modal">
      <article class="modal-content" id="modalContent"></article>
      <button class="modal-close" id="closeModal" aria-label="닫기">닫기</button>
    </dialog>

    <template id="rowTemplate">
      <section class="row-section">
        <div class="row-head">
          <h2></h2>
          <button class="row-more" type="button">더 보기</button>
        </div>
        <div class="poster-row"></div>
      </section>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
